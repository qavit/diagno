services:
  app:
    build: .
    ports:
      - "8080:8000"
    volumes:
      - ./data:/app/data
      - ./wisdom:/app/wisdom
    env_file:
      - .env
    restart: always
    container_name: diagno-app

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    container_name: diagno-frontend
